networks:
  kafkanet:
    driver: bridge
services:
  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    environment:
      # Cluster Basics
      KAFKA_NODE_ID: ${NODE_ID}                       
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_QUORUM_VOTERS}
      CLUSTER_ID: ${KAFKA_CLUSTER_UUID}     # Nrequired for multi-node 

      # Listeners
      # - Internal PLAINTEXT (for local containers)
      # - External SSL (for remote clients)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094,SSL://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,SSL://${KAFKA_DOMAIN}:9093 
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL 
      # Broker Configuration
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2       
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2  
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

      # SSL Configuration (apache/kafka style: direct passwords from .env)
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks    # filename only; file must be in the mounted secrets dir
      KAFKA_SSL_KEYSTORE_CREDENTIALS: key_creds          # file in secrets dir containing the keystore password
      KAFKA_SSL_KEY_CREDENTIALS: key_creds               # file in secrets dir containing the key password
      # Truststore (needed because inter-broker = SSL): pass directly — with client-auth=none the
      # script skips its truststore file-wiring, so set location+password yourself.
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${TRUST_PASS}
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_KEYSTORE_TYPE: JKS
      KAFKA_SSL_TRUSTSTORE_TYPE: JKS
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - kafka_data:/var/lib/kafka/data
      - /home/ec2-user/kafka/certs:/etc/kafka/secrets:ro
    ports:
      - 9092:9092   # PLAINTEXT internal
      - 9093:9093   # SSL external + inter-broker
      - 9094:9094   # NEW: CONTROLLER — restrict to the 2 instances in your security group
    networks:
      - kafkanet
    restart: unless-stopped
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kafkanet
volumes:
  pgdata:
  kafka_data: