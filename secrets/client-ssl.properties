# client-ssl.properties
# Used by kafka-topics / kafka-console-* and any external client to reach the SSL listener.
# Place at ./secrets/client-ssl.properties so it mounts to /etc/kafka/secrets/client-ssl.properties
security.protocol=SSL
ssl.truststore.location=/etc/kafka/secrets/kafka.truststore.jks
ssl.truststore.password=patapon
ssl.endpoint.identification.algorithm=https
 
# ---- For a non-JVM client (e.g. librdkafka / Go confluent-kafka-go) use the PEM CA instead ----
# security.protocol=SSL
# ssl.ca.location=/path/to/ca.crt
 
